name: Daily Security Scan

on:
  schedule:
    # Run every day at 2am UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:

  # ── 1. DEPENDENCY VULNERABILITIES ───────────
  dependency_scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.1.0
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan dependencies
        run: |
          pip-audit \
            -r requirements.txt \
            --format json \
            --output pip-audit-report.json \
            || true

      - name: Parse and report
        run: |
          python3 << 'PYEOF'
          import json
          import sys

          try:
            with open('pip-audit-report.json') as f:
              data = json.load(f)
          except:
            print("✅ No vulnerabilities found")
            sys.exit(0)

          vulns = data.get('dependencies', [])
          critical = []
          high = []
          medium = []

          for dep in vulns:
            for v in dep.get('vulns', []):
              severity = v.get('fix_versions', [])
              name = dep.get('name', 'unknown')
              vid = v.get('id', 'unknown')
              desc = v.get('description', '')[:100]

              if 'CRITICAL' in desc.upper():
                critical.append(f"{name}: {vid}")
              elif 'HIGH' in desc.upper():
                high.append(f"{name}: {vid}")
              else:
                medium.append(f"{name}: {vid}")

          print(f"🔴 Critical: {len(critical)}")
          print(f"🟠 High:     {len(high)}")
          print(f"🟡 Medium:   {len(medium)}")

          for v in critical:
            print(f"  ❌ CRITICAL: {v}")
          for v in high:
            print(f"  ⚠️  HIGH: {v}")

          if critical or high:
            sys.exit(1)
          PYEOF

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-scan-${{ github.run_number }}
          path: pip-audit-report.json
          retention-days: 30

  # ── 2. SECRET SCAN ──────────────────────────
  secret_scan:
    name: Secret Detection Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0

      - name: Run gitleaks full scan
        uses: gitleaks/gitleaks-action@v2.3.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --log-level=warn

  # ── 3. SAST SCAN ────────────────────────────
  sast_scan:
    name: Static Application Security (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      - name: Install semgrep
        run: pip install semgrep

      - name: Run semgrep
        run: |
          semgrep \
            --config=auto \
            --json \
            --output=semgrep-report.json \
            --severity=ERROR \
            --severity=WARNING \
            . || true

      - name: Parse semgrep results
        run: |
          python3 << 'PYEOF'
          import json
          import sys

          try:
            with open('semgrep-report.json') as f:
              data = json.load(f)
          except:
            print("✅ No SAST issues found")
            sys.exit(0)

          results = data.get('results', [])
          errors = [r for r in results
                    if r.get('extra', {})
                    .get('severity') == 'ERROR']
          warnings = [r for r in results
                      if r.get('extra', {})
                      .get('severity') == 'WARNING']

          print(f"🔴 Errors:   {len(errors)}")
          print(f"🟡 Warnings: {len(warnings)}")

          for e in errors[:5]:
            path = e.get('path', 'unknown')
            line = e.get('start', {}).get('line', 0)
            msg = e.get('extra', {}).get('message', '')
            print(f"  ❌ {path}:{line} - {msg[:80]}")

          if errors:
            sys.exit(1)
          PYEOF

      - name: Upload SAST report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-report-${{ github.run_number }}
          path: semgrep-report.json
          retention-days: 30

  # ── 4. DOCKER IMAGE SCAN ────────────────────
  docker_scan:
    name: Docker Image Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      - name: Build Docker image
        run: |
          docker build \
            -t helixcd-scan:latest \
            -f docker/agent/Dockerfile \
            . || echo "No Dockerfile yet"

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: helixcd-scan:latest
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH
          exit-code: 0
        continue-on-error: true

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report-${{ github.run_number }}
          path: trivy-report.json
          retention-days: 30

  # ── 5. LICENSE COMPLIANCE ───────────────────
  license_check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      - name: Install license checker
        run: pip install pip-licenses

      - name: Check licenses
        run: |
          pip install -r requirements.txt
          pip-licenses \
            --format=json \
            --output-file=licenses.json

          python3 << 'PYEOF'
          import json

          forbidden_licenses = [
            "GPL-2.0", "GPL-3.0",
            "AGPL-3.0", "LGPL-2.1",
            "CC-BY-NC", "PROPRIETARY"
          ]

          with open('licenses.json') as f:
            packages = json.load(f)

          violations = []
          for pkg in packages:
            license_name = pkg.get('License', '')
            pkg_name = pkg.get('Name', '')
            for forbidden in forbidden_licenses:
              if forbidden in license_name:
                violations.append(
                  f"{pkg_name}: {license_name}"
                )

          if violations:
            print("❌ License violations found:")
            for v in violations:
              print(f"  {v}")
            exit(1)

          print(f"✅ All {len(packages)} packages"
                f" have compatible licenses")
          PYEOF

  # ── 6. DAILY SUMMARY ISSUE ──────────────────
  create_summary:
    name: Create Daily Summary
    needs:
      - dependency_scan
      - secret_scan
      - sast_scan
      - license_check
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date()
              .toISOString().split('T')[0];
            const runUrl =
              `${context.serverUrl}/${context.repo.owner}`
              + `/${context.repo.repo}/actions/runs/`
              + `${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Security Issues Found - ${date}`,
              body: `## Daily Security Scan Failed\n\n`
                + `Date: ${date}\n`
                + `Run: ${runUrl}\n\n`
                + `### What Failed\n`
                + `Check the workflow run for details.\n\n`
                + `### Action Required\n`
                + `Review and fix before next release.\n\n`
                + `CC: @ShamshabadAnil`,
              labels: [
                'security',
                'automated',
                'priority-high'
              ],
              assignees: ['ShamshabadAnil']
            });
