name: Weekly Context and Memory Update

on:
  schedule:
    # Run every Monday at 3am UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:

  # ── 1. DEPENDENCY UPDATES CHECK ─────────────
  check_updates:
    name: Check Dependency Updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.1.0
        with:
          python-version: "3.11"

      - name: Check outdated packages
        run: |
          pip install -r requirements.txt
          pip list --outdated --format=json \
            > outdated.json || true

          python3 << 'PYEOF'
          import json

          try:
            with open('outdated.json') as f:
              packages = json.load(f)
          except:
            packages = []

          if not packages:
            print("✅ All packages up to date")
          else:
            print(f"📦 {len(packages)} packages outdated:")
            for pkg in packages:
              name = pkg.get('name', '')
              current = pkg.get('version', '')
              latest = pkg.get('latest_version', '')
              print(f"  {name}: {current} → {latest}")
          PYEOF

      - name: Upload outdated report
        uses: actions/upload-artifact@v4
        with:
          name: outdated-packages
          path: outdated.json
          retention-days: 7

  # ── 2. CODE METRICS ─────────────────────────
  code_metrics:
    name: Weekly Code Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.1.0
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          pip install radon xenon coverage

      - name: Calculate metrics
        run: |
          python3 << 'PYEOF'
          import subprocess
          import os
          from pathlib import Path

          py_files = list(Path('.').rglob('*.py'))
          py_files = [
            f for f in py_files
            if '.venv' not in str(f)
            and 'venv' not in str(f)
            and '__pycache__' not in str(f)
          ]

          print("📊 HelixCD Code Metrics")
          print("═" * 40)
          print(f"Total Python files: {len(py_files)}")

          total_lines = 0
          total_functions = 0
          total_classes = 0

          for f in py_files:
            try:
              content = f.read_text()
              lines = content.split('\n')
              total_lines += len(lines)
              total_functions += content.count('def ')
              total_classes += content.count('class ')
            except:
              pass

          print(f"Total lines:        {total_lines}")
          print(f"Total functions:    {total_functions}")
          print(f"Total classes:      {total_classes}")
          print("")

          # Check complexity
          result = subprocess.run(
            ['radon', 'cc', '-a', '-s', '.'],
            capture_output=True, text=True
          )
          if result.stdout:
            print("Complexity Analysis:")
            lines = result.stdout.split('\n')
            for line in lines[-5:]:
              if line.strip():
                print(f"  {line}")
          PYEOF

  # ── 3. WEEKLY SUMMARY ISSUE ─────────────────
  weekly_summary:
    name: Create Weekly Summary
    needs:
      - check_updates
      - code_metrics
    runs-on: ubuntu-latest
    steps:
      - name: Create weekly summary issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date()
              .toISOString().split('T')[0];
            const runUrl =
              `${context.serverUrl}/`
              + `${context.repo.owner}/`
              + `${context.repo.repo}/actions/runs/`
              + `${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Weekly Health Report - ${date}`,
              body: `## HelixCD Weekly Summary\n\n`
                + `Week of: ${date}\n`
                + `Details: ${runUrl}\n\n`
                + `### Checklist for ShamshabadAnil\n`
                + `- [ ] Review outdated packages\n`
                + [ ] Update AGENT_CONTEXT if needed\n`
                + `- [ ] Update MEMORY_LOG\n`
                + `- [ ] Review WORK_REGISTRY progress\n`
                + `- [ ] Check open PRs\n`
                + `- [ ] Review open issues\n\n`
                + `CC: @ShamshabadAnil`,
              labels: ['weekly-report', 'automated'],
              assignees: ['ShamshabadAnil']
            });
