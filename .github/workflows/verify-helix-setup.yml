name: Verify HelixCD Setup

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:

  check_helix_setup:
    name: Check Contributor Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      - name: Verify helix-setup token
        uses: actions/github-script@v7
        with:
          script: |
            const pr =
              context.payload.pull_request;
            const body = pr.body || '';
            const author =
              pr.user.login;

            // Owner is exempt
            if (author === 'ShamshabadAnil') {
              console.log(
                'Owner PR - setup check skipped'
              );
              return;
            }

            // Check for helix-verified token
            const tokenMatch = body.match(
              /helix-verified:\s*(helix-[a-f0-9]+)/i
            );

            if (!tokenMatch) {
              const message =
                '## Setup Verification Failed\n\n'
                + `@${author} - You must install `
                + 'helix-setup before contributing.\n\n'
                + '### Steps:\n'
                + '1. Download helix-setup:\n'
                + '   - **Windows**: [install.bat]'
                + '(https://github.com/ShamshabadAnil'
                + '/helix-setup/releases/latest)\n'
                + '   - **macOS**: '
                + '`bash <(curl -fsSL https://raw.githubusercontent.com'
                + '/ShamshabadAnil/helix-setup/main'
                + '/installers/macos/install.sh)`\n'
                + '2. Run: `helix setup`\n'
                + '3. Run: `helix verify`\n'
                + '4. Add your token to PR:\n'
                + '   `helix-verified: helix-xxxxx`\n\n'
                + '### Why?\n'
                + 'This ensures you have:\n'
                + '- Git hooks installed locally\n'
                + '- Standards enforcement active\n'
                + '- Correct workflow configured\n\n'
                + 'Without this, your code may not '
                + 'meet HelixCD standards.';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: message
              });

              core.setFailed(
                'helix-setup not verified. '
                + 'See PR comment for instructions.'
              );
              return;
            }

            const token = tokenMatch[1];
            console.log(
              `Verified token found: ${token}`
            );

            // Add verified label
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['helix-verified']
              });
            } catch(e) {
              console.log('Could not add label');
            }

            console.log(
              'Contributor setup verified!'
            );
