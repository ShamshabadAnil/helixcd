<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width,
    initial-scale=1.0,
    maximum-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>HelixCD — Agent Prompt</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system,
        BlinkMacSystemFont,
        'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 16px;
    }

    .header {
      text-align: center;
      padding: 20px 0 16px;
      border-bottom: 1px solid #1e293b;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #38bdf8;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 11px;
      color: #475569;
    }

    .status-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .badge-phase {
      background: #1e3a5f;
      color: #38bdf8;
    }

    .badge-progress {
      background: #1a2e1a;
      color: #4ade80;
    }

    .badge-updated {
      background: #1e1e2e;
      color: #94a3b8;
      font-weight: 400;
    }

    .task-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .task-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #475569;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .task-name {
      font-size: 18px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .task-id {
      font-size: 12px;
      color: #38bdf8;
      font-family: monospace;
    }

    .progress-bar {
      height: 6px;
      background: #1e293b;
      border-radius: 3px;
      margin: 16px 0;
      overflow: hidden;
      border: 1px solid #334155;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(
        90deg, #0ea5e9, #38bdf8
      );
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .prompt-section {
      margin-bottom: 16px;
    }

    .prompt-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #475569;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .token-count {
      font-size: 10px;
      color: #4ade80;
      font-weight: 600;
    }

    .prompt-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 14px;
      font-family: 'SF Mono', Monaco,
        'Courier New', monospace;
      font-size: 11px;
      line-height: 1.6;
      color: #94a3b8;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 240px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .copy-btn {
      width: 100%;
      padding: 18px;
      background: #0ea5e9;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all 0.15s ease;
      letter-spacing: 0.5px;
    }

    .copy-btn:active {
      transform: scale(0.98);
      background: #0284c7;
    }

    .copy-btn.copied {
      background: #16a34a;
    }

    .copy-btn.copied::before {
      content: "Copied! Now paste into ";
    }

    .paste-hint {
      text-align: center;
      font-size: 12px;
      color: #475569;
      margin-bottom: 20px;
    }

    .paste-hint span {
      color: #38bdf8;
      font-weight: 600;
    }

    .agents-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }

    .agent-btn {
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .agent-btn:active {
      background: #2d3f55;
      transform: scale(0.97);
    }

    .memory-section {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .memory-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #475569;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .memory-item {
      font-size: 12px;
      color: #94a3b8;
      padding: 6px 0;
      border-bottom: 1px solid #0f172a;
      line-height: 1.5;
    }

    .memory-item:last-child {
      border-bottom: none;
    }

    .refresh-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #475569;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 16px;
    }

    .refresh-btn:active {
      background: #1e293b;
      color: #94a3b8;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #334155;
      padding: 16px 0;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #16a34a;
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
    }

    @media (min-width: 480px) {
      body { max-width: 440px; margin: 0 auto; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">HelixCD</div>
    <div class="subtitle">
      Agent Prompt · Tap to copy
    </div>
  </div>

  <div class="status-bar">
    <span class="badge badge-phase"
      id="phase">documentation</span>
    <span class="badge badge-progress"
      id="progress-badge">0/181</span>
    <span class="badge badge-updated"
      id="updated">updating...</span>
  </div>

  <div class="task-card">
    <div class="task-label">Current Task</div>
    <div class="task-name" id="task-name">
      Loading...
    </div>
    <div class="task-id" id="task-id"></div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill"
      id="progress-fill"
      style="width: 0%">
    </div>
  </div>

  <div class="prompt-section">
    <div class="prompt-label">
      Agent Prompt
      <span class="token-count"
        id="token-count">
        ~0 tokens
      </span>
    </div>
    <div class="prompt-box" id="prompt-box">
      Loading prompt...
    </div>
  </div>

  <button class="copy-btn"
    id="copy-btn"
    onclick="copyPrompt()">
    Tap to Copy Prompt
  </button>

  <div class="paste-hint">
    Then paste into
    <span>Claude</span> or
    <span>Cursor</span>
  </div>

  <div class="agents-row">
    <a class="agent-btn"
      href="https://claude.ai"
      target="_blank">
      Claude
    </a>
    <a class="agent-btn"
      href="https://cursor.sh"
      target="_blank">
      Cursor
    </a>
  </div>

  <div class="memory-section">
    <div class="memory-label">
      Last Sessions
    </div>
    <div id="memory-list">
      <div class="memory-item">
        Loading...
      </div>
    </div>
  </div>

  <button class="refresh-btn"
    onclick="loadData()">
    Refresh
  </button>

  <div class="footer">
    HelixCD · Owner: ShamshabadAnil
  </div>

  <div class="toast" id="toast">
    Copied!
  </div>

  <script>
    // Data injected by GitHub Actions
    // Falls back to data.json
    const DATA_URL = './data.json';

    let currentPrompt = '';

    async function loadData() {
      try {
        const res = await fetch(
          DATA_URL + '?t=' + Date.now()
        );
        const data = await res.json();
        renderData(data);
      } catch(e) {
        document.getElementById('task-name')
          .textContent = 'Could not load data';
        document.getElementById('task-name')
          .style.color = '#ef4444';
      }
    }

    function renderData(data) {
      // Task
      const taskName = document.getElementById(
        'task-name'
      );
      const taskId = document.getElementById(
        'task-id'
      );
      taskName.textContent =
        data.task_name || 'No task found';
      taskId.textContent =
        data.task_id
        ? 'ID: ' + data.task_id
        : '';

      // Progress
      const done = data.progress_done || 0;
      const total = data.progress_total || 181;
      const pct = data.progress_percent || 0;

      document.getElementById('progress-badge')
        .textContent = done + '/' + total;
      document.getElementById('progress-fill')
        .style.width = pct + '%';

      // Phase
      document.getElementById('phase')
        .textContent = data.phase || 'docs';

      // Updated
      const updated = data.updated
        ? new Date(data.updated)
            .toLocaleString('en',{
              month:'short',
              day:'numeric',
              hour:'2-digit',
              minute:'2-digit'
            })
        : 'unknown';
      document.getElementById('updated')
        .textContent = updated;

      // Prompt
      const prompt = data.prompt || '';
      currentPrompt = prompt;
      document.getElementById('prompt-box')
        .textContent = prompt;

      // Token count
      const tokens = Math.round(
        prompt.length / 4
      );
      document.getElementById('token-count')
        .textContent = '~' + tokens + ' tokens';

      // Memory
      const memory = data.memory || [];
      const memList = document.getElementById(
        'memory-list'
      );
      if (memory.length > 0) {
        memList.innerHTML = memory
          .slice(-3)
          .map(m =>
            '<div class="memory-item">'
            + m + '</div>'
          )
          .join('');
      } else {
        memList.innerHTML =
          '<div class="memory-item">' +
          'No sessions yet</div>';
      }
    }

    function copyPrompt() {
      if (!currentPrompt) return;

      const btn = document.getElementById(
        'copy-btn'
      );
      const toast = document.getElementById(
        'toast'
      );

      // Try modern clipboard API
      if (navigator.clipboard) {
        navigator.clipboard
          .writeText(currentPrompt)
          .then(() => showCopied(btn, toast))
          .catch(() => fallbackCopy(btn, toast));
      } else {
        fallbackCopy(btn, toast);
      }
    }

    function fallbackCopy(btn, toast) {
      // Create temp textarea
      const ta = document.createElement(
        'textarea'
      );
      ta.value = currentPrompt;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();

      try {
        document.execCommand('copy');
        showCopied(btn, toast);
      } catch(e) {
        // Manual select fallback
        ta.style.opacity = '1';
        ta.style.position = 'static';
        ta.style.width = '100%';
        ta.style.height = '120px';
        ta.style.fontSize = '14px';
        btn.textContent =
          'Select all text above and copy';
      }

      document.body.removeChild(ta);
    }

    function showCopied(btn, toast) {
      btn.classList.add('copied');
      btn.textContent =
        'Copied! Paste into Claude or Cursor';
      toast.classList.add('show');

      setTimeout(() => {
        btn.classList.remove('copied');
        btn.textContent = 'Tap to Copy Prompt';
        toast.classList.remove('show');
      }, 3000);
    }

    // Load on start
    loadData();

    // Auto refresh every 5 minutes
    setInterval(loadData, 300000);
  </script>
</body>
</html>
