[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
asyncio_mode = auto
addopts =
    --verbose
    --cov=.
    --cov-report=term-missing
    --cov-fail-under=80
    --cov-omit=tests/*,venv/*,.venv/*,scripts/*
filterwarnings =
    ignore::DeprecationWarning
